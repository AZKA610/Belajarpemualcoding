<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software yang Dibutuhkan</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #3498db;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            color: black;
            padding: 30px;
            width: 420px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: left;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .item {
            margin-bottom: 12px;
            font-size: 16px;
        }

        .label {
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Software yang Dibutuhkan</h1>

    <div class="item">
        <span class="label">1. Text Editor:</span> Visual Studio Code
    </div>

    <div class="item">
        <span class="label">2. Browser:</span> Google Chrome atau firefox
    </div>

    <div class="item">
        <span class="label">3. Tools Tambahan:</span> Git (untuk menyimpan project)
    </div>

    <div class="item">
        <span class="label">4. Ekstensi:</span> Live Server (untuk menjalankan HTML)
    Autotag (untuk otomatis tag dan membuat lebih cepat)
    </div>

</div>

</body>
</html>
