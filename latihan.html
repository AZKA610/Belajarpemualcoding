<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Belajar Coding Pemula</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
        }

        header {
            padding: 30px;
            font-size: 28px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.2);
        }

        .container {
            margin-top: 100px;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            font-size: 16px;
            color: white;
            background: #007BFF;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<header>
    Belajar Coding Pemula
</header>

<div class="container">
    <button class="btn" onclick="window.location.href='software.html'">Software yang dibutuhkan</button>
    <button class="btn" onclick="window.location.href='html.html'">HTML</button>
    <button class="btn" onclick="window.location.href='php.html'">PHP</button>
    <button class="btn" onclick="window.location.href='aboutme.html'">aboutme</button>
</div>

</body>
</html>
